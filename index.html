<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Fuel — Client Hub</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#12100E;--fuel:#E8591A;--offwhite:#FAF9F7;--gray:#6B6762;--white:#fff;--line:rgba(18,16,14,.13);}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--offwhite);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:16px;}
  .hold{text-align:center;padding:60px 32px;}
  .brand{font-weight:900;font-size:2rem;letter-spacing:-.05em;color:var(--ink);}
  .brand span{color:var(--fuel);}
  p{color:var(--gray);margin:18px 0 0;font-size:.95rem;}
</style>
</head>
<body>
<div class="hold">
  <div class="brand">impact fuel<span>.</span></div>
  <p>Client workspaces are private.<br>You'll receive a direct link from your Impact Fuel team.</p>
</div>
</body>
</html>
